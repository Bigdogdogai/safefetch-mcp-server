name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile server.py test_server.py fetch_test.py test_playwright.py safefetch/app.py safefetch/__init__.py safefetch/__main__.py

      - name: Offline self-test
        run: python -m safefetch --self-test

      - name: Unit tests
        run: python -m unittest test_server.py
